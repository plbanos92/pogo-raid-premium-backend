name: Supabase CI

on:
  push:
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-ci.yml'
  pull_request:
    paths:
      - 'supabase/**'
      - '.github/workflows/supabase-ci.yml'

jobs:
  db-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -f supabase/config.toml
          test -f supabase/seed.sql
          test -f supabase/tests/01_rpc_and_rls.sql
          test -f supabase/tests/04_egg_lobby.sql

      - name: Validate migration files exist
        run: ls supabase/migrations/*.sql | wc -l | xargs -I{} test {} -gt 0
